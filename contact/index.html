<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LearningBoard | learningboard.online</title>
    <link rel="icon" href="/blackboard/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Outfit', sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            margin-top: 10vh;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 5px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            font-weight: 500;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .email-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #34d399 0%, #3b82f6 100%);
            border: none;
            border-radius: 30px;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.3);
        }

        .email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 211, 153, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Let's Get in Touch</h1>
        <p>We'd love to hear your feedback, feature requests, or partnership inquiries.</p>

        <div class="email-btn" onclick="openEmail()">Email Support</div>

        <br><br><br><br>
        <a href="/blackboard" class="back-link">Return to Application</a>
    </div>

    <script>
        // Simple obfuscation to slow down basic scraping bots
        function openEmail() {
            var user = "support";
            var domain = "learningboard.online";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>
</body>

</html>
